bundle:
  name: abc-marketing-pipeline

resources:
  jobs:
    abc_pipeline_job:
      name: "ABC Marketing Pipeline"
      
      # 1. ADD THIS BLOCK: Define the Serverless Environment
      environments:
        - environment_key: wheel_env
          spec:
            client_version: "1"
            dependencies:
              - /Volumes/workspace/default/data/crash_logger-0.1.0-py3-none-any.whl

      tasks:
        - task_key: generate_mock_data
          notebook_task:
            notebook_path: src/00_generate_mock_data.py 

        - task_key: abc_analysis
          depends_on:
            - task_key: generate_mock_data
          notebook_task:
            notebook_path: src/01_abc_analysis.py

        - task_key: characterization
          depends_on:
            - task_key: abc_analysis
          notebook_task:
            notebook_path: src/02_characterization.py

        - task_key: prediction
          depends_on:
            - task_key: characterization
          notebook_task:
            notebook_path: src/03_prediction.py

        # 2. UPDATE YOUR TASK: Remove 'libraries', add 'environment_key'
        - task_key: crash_logger_execution
          depends_on:
            - task_key: prediction
          environment_key: wheel_env 
          notebook_task:
            notebook_path: src/04_execute_logger.py 

targets:
  prod:
    workspace:
      host: https://dbc-91e4a242-418c.cloud.databricks.com/
