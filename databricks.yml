bundle:
  name: abc-marketing-pipeline

resources:
  jobs:
    abc_pipeline_job:
      name: "ABC Marketing Pipeline"
            
      tasks:
        - task_key: generate_mock_data
          notebook_task:
            notebook_path: src/00_generate_mock_data.py 

        - task_key: abc_analysis
          depends_on:
            - task_key: generate_mock_data
          notebook_task:
            notebook_path: src/01_abc_analysis.py

        - task_key: characterization
          depends_on:
            - task_key: abc_analysis
          notebook_task:
            notebook_path: src/02_characterization.py

        - task_key: prediction
          depends_on:
            - task_key: characterization
          notebook_task:
            notebook_path: src/03_prediction.py

        # --- THE SERVERLESS-COMPLIANT TASK ---
        - task_key: crash_logger_execution
          depends_on:
            - task_key: prediction
          notebook_task:
            notebook_path: src/04_execute_logger.py # Points to your new 2-line wrapper
          libraries:
            - whl: /Volumes/workspace/default/data/crash_logger-0.1.0-py3-none-any.whl

targets:
  prod:
    workspace:
      host: https://dbc-91e4a242-418c.cloud.databricks.com/
