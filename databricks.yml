bundle:
  name: abc-marketing-pipeline

resources:
  jobs:
    abc_pipeline_job:
      name: "ABC Marketing Pipeline"
      
      environments:
        - environment_key: serverless_env
          spec:
            client_version: "1"
            
      tasks:
        - task_key: generate_mock_data
          environment_key: serverless_env
          spark_python_task:
            python_file: src/00_generate_mock_data.py

        - task_key: abc_analysis
          depends_on:
            - task_key: generate_mock_data
          environment_key: serverless_env
          spark_python_task:
            python_file: src/01_abc_analysis.py

        - task_key: characterization
          depends_on:
            - task_key: abc_analysis
          environment_key: serverless_env
          spark_python_task:
            python_file: src/02_characterization.py

        - task_key: prediction
          depends_on:
            - task_key: characterization
          environment_key: serverless_env
          spark_python_task:
            python_file: src/03_prediction.py

targets:
  prod:
    workspace:
      host: https://dbc-91e4a242-418c.cloud.databricks.com/
