bundle:
  name: abc-marketing-pipeline

resources:
  jobs:
    abc_pipeline_job:
      name: "ABC Marketing Pipeline"
      
      # Define the compute environment to satisfy the bundle validator
      job_clusters:
        - job_cluster_key: wheel_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2 
            num_workers: 1
            
      tasks:
        - task_key: generate_mock_data
          notebook_task:
            notebook_path: src/00_generate_mock_data.py 

        - task_key: abc_analysis
          depends_on:
            - task_key: generate_mock_data
          notebook_task:
            notebook_path: src/01_abc_analysis.py

        - task_key: characterization
          depends_on:
            - task_key: abc_analysis
          notebook_task:
            notebook_path: src/02_characterization.py

        - task_key: prediction
          depends_on:
            - task_key: characterization
          notebook_task:
            notebook_path: src/03_prediction.py

        # --- THE WHEEL-ONLY TASK ---
        - task_key: crash_logger_execution
          depends_on:
            - task_key: prediction
          job_cluster_key: wheel_cluster # Assigns the cluster defined above
          python_wheel_task:
            package_name: crash_logger
            entry_point: main
          libraries:
            - whl: /Volumes/workspace/default/data/crash_logger-0.1.0-py3-none-any.whl

targets:
  prod:
    workspace:
      host: https://dbc-91e4a242-418c.cloud.databricks.com/
